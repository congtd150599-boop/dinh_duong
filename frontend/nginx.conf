server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy API calls to the backend container — avoids CORS entirely
  # since the browser only ever talks to this one origin.
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA fallback — any unknown path serves index.html so React Router-less
  # client-side tab state (query params, etc.) never 404s on refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
