name: dinhduong-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dinhduong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dinhduong_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-dinhduong}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dinhduong}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    # See docker-compose.dev.yml's comment on env_file — JWT_SECRET/ADMIN_* need
    # their real .env values, not compose-interpolation defaults.
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dinhduong:dinhduong_dev_password@postgres:5432/dinhduong?schema=public}
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    # No bind mounts, no host port mapping — only the frontend's Nginx
    # (proxying /api/) and other containers on this network can reach it.
    # `backups` is a SEPARATE named volume from `pgdata_prod` on purpose — a
    # backup that shared fate with the database it's backing up (e.g. both
    # lost if the same volume were deleted) would defeat the point of having one.
    volumes:
      - backups:/app/backend/backups

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

  # Public exposure via Cloudflare Tunnel — outbound-only connection to
  # Cloudflare's edge, no open inbound port/public IP needed on this host.
  # The tunnel itself (which hostname maps to which local service) is
  # configured in the Cloudflare Zero Trust dashboard, not here — this
  # container just authenticates with CLOUDFLARE_TUNNEL_TOKEN (.env) and
  # relays traffic to `frontend:80` per that dashboard config. Reaches
  # `frontend` by Docker service-name DNS, same as frontend's own nginx.conf
  # reaches `backend:4000` — no host networking needed.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend

volumes:
  pgdata_prod:
  backups:
